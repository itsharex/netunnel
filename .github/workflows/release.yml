name: "publish"

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            go_target: "aarch64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
            go_target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            go_target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      NETUNNEL_AGENT_TARGET: ${{ matrix.go_target }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install pnpm + deps
        uses: pnpm/action-setup@v4.2.0
        with:
          run_install: true

      - name: Use Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Use Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/netunnel-agent/go.mod

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: tauri-apps/tauri-action@action-v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src/netunnel-desktop-tauri
          tauriScript: pnpm exec tauri
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the repository changelog and release assets for this version."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} --config src-tauri/tauri.updater.conf.json
