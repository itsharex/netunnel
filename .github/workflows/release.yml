name: "publish"

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target_path: "src-tauri/target/aarch64-apple-darwin/release/bundle"
          - platform: "ubuntu-24.04"
            args: ""
            target_path: "src-tauri/target/release/bundle"
          - platform: "windows-latest"
            args: ""
            target_path: "src-tauri/target/release/bundle"

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install pnpm + deps
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10.0.0
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/netunnel-desktop-tauri
        run: pnpm install --no-frozen-lockfile

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri
        working-directory: src/netunnel-desktop-tauri
        run: pnpm exec tauri build --config src-tauri/tauri.updater.conf.json ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: |
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.msi
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.msi.sig
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*setup*.exe
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.exe.sig
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.dmg
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.dmg.sig
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.deb
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.deb.sig
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.rpm
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.rpm.sig
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.AppImage
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.AppImage.sig
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.tar.gz
            src/netunnel-desktop-tauri/${{ matrix.target_path }}/**/*.tar.gz.sig

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundles-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
